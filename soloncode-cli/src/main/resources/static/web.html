<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Solon Code Web</title>
    <link rel="stylesheet" href="/layui/css/layui.css"/>
    <link rel="stylesheet" href="/css/theme.css"/>
    <style>
        :root { --sidebar-width: 260px; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: var(--font-sans); background: var(--bg-body); color: var(--text-primary); display: flex; font-size: 14px; transition: background 0.3s, color 0.3s; }

        /* ===== Sidebar ===== */
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; transition: background 0.3s; }
        .sidebar-header { padding: 20px 16px 16px; }
        .new-chat-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 0; border: 1px dashed var(--border-color); border-radius: 10px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .new-chat-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
        .sidebar-title { padding: 16px 16px 8px; font-size: 11px; color: var(--text-secondary); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 4px 10px; }
        .sidebar-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; color: var(--text-sidebar); font-size: 13px; display: flex; align-items: center; transition: all 0.15s; margin-bottom: 2px; }
        .sidebar-item:hover { background: var(--bg-hover); }
        .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
        .sidebar-item-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-item-del { display: none; flex-shrink: 0; width: 22px; height: 22px; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--text-secondary); font-size: 14px; align-items: center; justify-content: center; margin-left: 4px; transition: all 0.15s; }
        .sidebar-item:hover .sidebar-item-del { display: flex; }
        .sidebar-item-del:hover { background: #ef444422; color: #ef4444; }
        .sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }

        /* Sidebar collapse toggle */
        .sidebar-toggle-btn {
            position: fixed;
            top: 20px;
            left: calc(var(--sidebar-width) - 14px);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-sidebar);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 100;
            transition: left 0.25s ease, background 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            line-height: 1;
        }
        .sidebar-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-toggle-btn.collapsed { left: 4px; }
        .sidebar.collapsed { width: 0 !important; min-width: 0 !important; flex: 0 1 0 !important; overflow: hidden; border-right: none; padding: 0 !important; }
        @media (max-width: 768px) { .sidebar-toggle-btn { display: none !important; } }

        /* Streaming indicator for sidebar items */
        .sidebar-item.streaming { border-left: 3px solid var(--accent); padding-left: 9px; }
        .sidebar-item.streaming:hover .sidebar-item-del { display: none; }
        .sidebar-item-spinner {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: blob-spin 0.8s linear infinite;
            margin-left: 6px;
        }

        /* ===== Main ===== */
        .main-area { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; background: var(--bg-main); transition: background 0.3s; }

        /* Header */
        .main-header { padding: 14px 28px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
        .theme-toggle { background: none; border: 1px solid var(--border-color); border-radius: 10px; padding: 6px 10px; cursor: pointer; color: var(--text-secondary); font-size: 16px; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
        .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .wechat-btn-header { border: 1px solid var(--accent); border-radius: 10px; padding: 6px 10px; cursor: pointer; color: #fff; font-size: 16px; transition: all 0.2s; display: flex; align-items: center; gap: 4px; background: var(--accent); }
        .wechat-btn-header:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .wechat-btn-header.bound { background: none; border: 1px solid #07c160; color: #07c160; }
        .wechat-btn-header .wechat-label { font-size: 12px; }

        /* WeChat QR Modal */
        .wechat-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; animation: modal-fade-in 0.2s ease-out; }
        @keyframes modal-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .wechat-modal { background: var(--bg-input-box); border-radius: 16px; padding: 28px 32px; min-width: 320px; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .wechat-modal-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .wechat-modal-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
        .wechat-qr-wrap { width: 220px; height: 220px; margin: 0 auto 20px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .wechat-qr-wrap img { max-width: 200px; max-height: 200px; }
        .wechat-status { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
        .wechat-status.scanned { color: #07c160; }
        .wechat-status.error { color: #ef4444; }
        .wechat-modal-close { margin-top: 8px; padding: 8px 24px; border: 1px solid var(--border-color); border-radius: 8px; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .wechat-modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* ===== Welcome ===== */
        .welcome-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 24px 80px; }
        .welcome-avatar { width: 120px; height: 120px; position: relative; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; }
        .welcome-avatar .blob { position: absolute; }
        .welcome-avatar .blob-outer {
            width: 110px; height: 110px;
            background: conic-gradient(from 0deg, #4f6ef7, #818cf8 15%, #a78bfa 30%, #c084fc 50%, #818cf8 70%, #4f6ef7 85%, #4f6ef7);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: blob-morph1 8s ease-in-out infinite, blob-spin 6s linear infinite;
            opacity: 0.82;
            filter: blur(1.5px) drop-shadow(0 0 14px rgba(79,110,247,0.4));
        }
        .welcome-avatar .blob-core {
            width: 38px; height: 38px; z-index: 1;
            border-radius: 50% 40% 60% 35% / 40% 55% 35% 60%;
            background: linear-gradient(135deg, var(--accent), #a78bfa, #c084fc, var(--accent));
            background-size: 300% 300%;
            animation: core-flow 4s ease infinite, core-morph 5s ease-in-out infinite, core-pulse 3s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(79,110,247,0.45), 0 0 44px rgba(167,139,250,0.2);
            filter: blur(0.5px);
        }
        @keyframes blob-morph1 {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            25%      { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            50%      { border-radius: 50% 60% 30% 60% / 30% 50% 70% 60%; }
            75%      { border-radius: 40% 60% 50% 40% / 60% 40% 60% 50%; }
        }
        @keyframes blob-spin { to { transform: rotate(360deg); } }
        @keyframes core-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes core-morph {
            0%, 100% { border-radius: 50% 40% 60% 35% / 40% 55% 35% 60%; }
            20%      { border-radius: 35% 55% 40% 60% / 55% 35% 60% 40%; }
            40%      { border-radius: 60% 35% 50% 45% / 35% 60% 45% 55%; }
            60%      { border-radius: 40% 60% 35% 55% / 60% 40% 55% 35%; }
            80%      { border-radius: 55% 45% 55% 40% / 45% 50% 40% 60%; }
        }
        @keyframes core-pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(79,110,247,0.45), 0 0 44px rgba(167,139,250,0.2); } 50% { transform: scale(1.1); box-shadow: 0 0 28px rgba(79,110,247,0.55), 0 0 56px rgba(167,139,250,0.3); } }
        .welcome-title { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        .welcome-sub { color: var(--text-secondary); font-size: 15px; margin-bottom: 36px; }
        .welcome-input-box { width: 100%; max-width: 680px; background: var(--bg-input-box); border: 1px solid var(--border-input); border-radius: 16px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; transition: all 0.25s; }
        .welcome-input-box:focus-within { border-color: var(--accent); box-shadow: var(--shadow-lg), 0 0 0 4px rgba(79,110,247,0.08); }
        .welcome-input-box textarea { border: none; outline: none; resize: none; background: transparent; padding: 18px 20px 8px; font-family: var(--font-sans); font-size: 15px; color: var(--text-primary); min-height: 54px; max-height: 140px; line-height: 1.6; }
        .welcome-input-box textarea::placeholder { color: var(--text-secondary); }
        .welcome-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; gap: 8px; }
        .welcome-send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .welcome-send-btn:hover { background: var(--accent-hover); transform: scale(1.06); }

        /* ===== Chat View ===== */
        .chat-view { flex: 1; display: none; flex-direction: column; min-height: 0; }
        .chat-view.active { display: flex; }
        .messages-wrap { flex: 1; overflow-y: auto; }
        .messages-inner { max-width: 820px; margin: 0 auto; padding: 28px 24px 12px; }

        /* Message */
        .msg-row { display: flex; margin-bottom: 28px; gap: 14px; animation: msg-in 0.25s ease-out; }
        @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.assistant { justify-content: flex-start; }
        .msg-avatar { width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
        .msg-row.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; }
        .msg-row.user .msg-avatar { background: var(--bg-hover); color: var(--text-secondary); }

        .msg-bubble { max-width: 75%; line-height: 1.75; word-break: break-word; }
        .msg-row.user .msg-bubble { background: var(--bg-user-msg); color: var(--text-user-msg); padding: 12px 18px; border-radius: 20px 20px 4px 20px; font-size: 14px; }
        .msg-row.assistant .msg-bubble { max-width: 88%; min-width: 88%; }

        /* Markdown */
        .md-content { padding: 2px 0; color: var(--text-ai-msg); font-size: 14px; }
        .md-content > :first-child { margin-top: 0; }
        .md-content > :last-child { margin-bottom: 0; }
        .md-content p { margin: 7px 0; }
        .md-content h1, .md-content h2, .md-content h3, .md-content h4 { margin: 16px 0 8px; font-weight: 600; color: var(--text-primary); }
        .md-content h1 { font-size: 1.35em; } .md-content h2 { font-size: 1.2em; } .md-content h3 { font-size: 1.08em; }
        .md-content strong { font-weight: 600; }
        .md-content code { background: var(--bg-code); padding: 2px 7px; border-radius: 5px; font-family: var(--font-mono); font-size: 0.87em; }
        .md-content pre { background: var(--bg-code-block); padding: 16px 18px; border-radius: 10px; overflow-x: auto; margin: 10px 0; }
        .md-content pre code { background: none; padding: 0; color: var(--text-code); font-size: 13px; }
        .md-content ul, .md-content ol { padding-left: 22px; margin: 7px 0; }
        .md-content li { margin: 4px 0; }
        .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-secondary); margin: 10px 0; }
        .md-content a { color: var(--accent); text-decoration: none; } .md-content a:hover { text-decoration: underline; }
        .md-content table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 13px; }
        .md-content th, .md-content td { border: 1px solid var(--border-color); padding: 7px 12px; text-align: left; }
        .md-content th { background: var(--bg-hover); font-weight: 600; }
        .md-content img { max-width: 100%; border-radius: 8px; }
        .md-content hr { border: none; border-top: 1px solid var(--border-color); margin: 14px 0; }

        /* Tool Card */
        .tool-card { margin: 10px 0; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
        .tool-card-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.15s; font-size: 13px; overflow: hidden; }
        .tool-card-header:hover { background: var(--bg-hover); }
        .tool-status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all 0.3s; }
        .tool-status-icon.loading { border: 2px solid var(--border-color); border-top-color: var(--accent); animation: blob-spin 0.8s linear infinite; }
        .tool-status-icon.done { background: #22c55e; color: #fff; border: none; animation: none; }
        .tool-name { font-weight: 600; color: var(--text-primary); white-space: nowrap; flex-shrink: 0; }
        .tool-args { color: #999; font-size: 12px; font-weight: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .tool-label { color: var(--text-secondary); font-size: 12px; }
        .tool-toggle { margin-left: auto; color: var(--text-secondary); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
        .tool-card.expanded .tool-toggle { transform: rotate(90deg); }
        .tool-card-body { display: none; padding: 0 14px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border-color); }
        .tool-card.expanded .tool-card-body { display: block; }

        .chunk-error { margin: 8px 0; padding: 10px 14px; background: var(--error-bg); border-left: 3px solid var(--error-border); border-radius: 6px; color: var(--error-text); font-size: 13px; }

        /* HITL Card */
        .hitl-card { margin: 10px 0; border: 1px solid #f59e0b; border-radius: 10px; overflow: hidden; background: var(--bg-input-box); animation: msg-in 0.25s ease-out; }
        .hitl-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; font-size: 14px; font-weight: 600; color: #f59e0b; border-bottom: 1px solid var(--border-color); }
        .hitl-card-header i { font-size: 18px; }
        .hitl-card-body { padding: 12px 14px; font-size: 13px; color: var(--text-primary); }
        .hitl-card-body .hitl-tool { margin-bottom: 6px; color: var(--text-secondary); }
        .hitl-card-body .hitl-tool strong { color: var(--text-primary); }
        .hitl-card-body .hitl-command { background: var(--bg-code-block); padding: 10px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 13px; color: var(--text-code); word-break: break-all; margin: 8px 0 12px; }
        .hitl-card-actions { display: flex; gap: 10px; padding: 0 14px 14px; }
        .hitl-btn { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .hitl-btn-approve { background: #22c55e; color: #fff; }
        .hitl-btn-approve:hover { background: #16a34a; }
        .hitl-btn-reject { background: #ef4444; color: #fff; }
        .hitl-btn-reject:hover { background: #dc2626; }
        .hitl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Msg Actions */
        .msg-actions { display: flex; gap: 6px; margin-top: 10px; opacity: 0; transition: opacity 0.2s; }
        .msg-row.assistant:hover .msg-actions { opacity: 1; }
        .msg-action-btn { background: none; border: 1px solid var(--border-color); border-radius: 8px; padding: 5px 10px; cursor: pointer; color: var(--text-secondary); font-size: 12px; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
        .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent); }

        /* User Message Copy */
        .msg-row.user { gap: 8px; }
        .user-copy-btn { background: none; border: none; border-radius: 8px; padding: 4px; cursor: pointer; color: var(--text-secondary); font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.2s, background 0.15s, color 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg-row.user:hover .user-copy-btn { opacity: 0.6; }
        .user-copy-btn:hover { opacity: 1 !important; background: var(--bg-hover); color: var(--text-primary); }
        .user-copy-btn.copied { color: #22c55e; opacity: 1 !important; }

        /* Thinking */
        .inline-thinking { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--text-secondary); font-size: 13px; }
        .thinking-timer { font-variant-numeric: tabular-nums; color: var(--text-secondary); opacity: 0.7; font-size: 12px; margin-left: 2px; }
        .thinking-row { display: flex; gap: 14px; margin-bottom: 28px; animation: msg-in 0.25s ease-out; }
        .thinking-bubble { display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 14px; padding: 10px 0; }
        .thinking-dots { display: flex; gap: 5px; }
        .thinking-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--thinking-dot); animation: dot-bounce 1.4s ease-in-out infinite; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce { 0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1.15); } }

        /* Thinking Block (collapsible reasoning content) */
        .thinking-block { margin: 0 0 12px; border: 1px solid var(--thinking-block-border); border-radius: 10px; overflow: hidden; background: var(--thinking-block-bg); }
        .thinking-block-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; font-size: 13px; user-select: none; transition: background 0.15s; }
        .thinking-block-header:hover { background: var(--bg-hover); }
        .thinking-block-label { color: var(--text-secondary); font-weight: 500; }
        .thinking-block-toggle { margin-left: auto; color: var(--text-secondary); font-size: 12px; transition: transform 0.25s; }
        .thinking-block.expanded .thinking-block-toggle { transform: rotate(90deg); }
        .thinking-block-body { padding: 0 14px 12px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; border-top: 1px solid var(--thinking-block-border); max-height: 300px; overflow-y: auto; }
        .thinking-block-body .md-content { color: var(--text-secondary); font-size: 13px; }
        .thinking-block:not(.expanded) .thinking-block-body { display: none; }
        .thinking-block.streaming { border-color: var(--accent); }
        .thinking-block.streaming .thinking-block-label { color: var(--accent); }
        .thinking-block-dots { display: inline-flex; gap: 4px; margin-left: 4px; vertical-align: middle; }
        .thinking-block-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.4s ease-in-out infinite; }
        .thinking-block-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-block-dots span:nth-child(3) { animation-delay: 0.4s; }
        /* Bottom Input */
        .input-wrap { padding: 12px 24px 22px; flex-shrink: 0; }
        .input-box { max-width: 820px; margin: 0 auto; background: var(--bg-input-box); border: 1px solid var(--border-input); border-radius: 14px; box-shadow: var(--shadow); display: flex; flex-direction: column; transition: all 0.25s; }
        .input-box:focus-within { border-color: var(--accent); box-shadow: var(--shadow), 0 0 0 3px rgba(79,110,247,0.06); }
        .input-box textarea { border: none; outline: none; resize: none; background: transparent; padding: 14px 16px 6px; font-family: var(--font-sans); font-size: 14px; color: var(--text-primary); min-height: 44px; max-height: 140px; line-height: 1.6; }
        .input-box textarea::placeholder { color: var(--text-secondary); }
        .input-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; gap: 8px; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn.stop-mode { background: #ef4444; }
        .send-btn.stop-mode:hover { background: #dc2626; }
        .send-btn.stop-mode .stop-icon { width: 14px; height: 14px; background: #fff; border-radius: 3px; }

        /* Model Selector */
        .model-selector { position: relative; display: flex; align-items: center; }
        .model-selector-current { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-input-box); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; max-width: 200px; }
        .model-selector-current:hover { border-color: var(--accent); color: var(--text-primary); background: var(--bg-hover); }
        .model-selector-current .model-name { overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .model-selector-current .model-arrow { font-size: 12px; transition: transform 0.2s; opacity: 0.5; }
        .model-selector.open .model-arrow { transform: rotate(180deg); }
        .model-dropdown { position: absolute; bottom: 100%; left: 0; margin-bottom: 6px; background: var(--bg-input-box); border: 1px solid var(--border-color); border-radius: 10px; box-shadow: var(--shadow-lg); min-width: 220px; max-height: 280px; overflow-y: auto; display: none; z-index: 100; animation: drop-up 0.15s ease-out; }
        .model-selector.open .model-dropdown { display: block; }
        @keyframes drop-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .model-dropdown-item { padding: 10px 14px; cursor: pointer; font-size: 13px; color: var(--text-primary); display: flex; flex-direction: column; gap: 2px; transition: background 0.15s; }
        .model-dropdown-item:hover { background: var(--bg-hover); }
        .model-dropdown-item.active { background: var(--accent-light); color: var(--accent); }
        .model-dropdown-item .model-item-name { font-weight: 500; font-size: 13px; }
        .model-dropdown-item .model-item-desc { font-size: 11px; color: var(--text-secondary); }
        .model-dropdown-item.active .model-item-desc { color: var(--accent); opacity: 0.7; }
        .model-dropdown::-webkit-scrollbar { width: 4px; }
        .model-dropdown::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        /* Attachments Preview */
        .attachments-wrap { padding: 8px 14px 0; display: none; }
        .attachments-wrap.has-items { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
        .attachment-item { position: relative; display: inline-flex; flex-shrink: 0; }
        .attachment-item img { height: 60px; max-width: 120px; border-radius: 6px; border: 1px solid var(--border-color); object-fit: cover; }
        .attachment-item-file { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 6px; max-width: 200px; }
        .attachment-item-file .file-icon { font-size: 16px; color: var(--accent); }
        .attachment-item-file .file-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .attachment-item-remove { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: #ef4444; color: #fff; border: 2px solid var(--bg-input-box); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; line-height: 1; }
        .attachment-item-remove:hover { background: #dc2626; }

        /* Attach Button */
        .attach-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .attach-btn:hover { background: var(--bg-hover); color: var(--accent); }
        .attach-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .attach-input { display: none; }

        /* Toolbar left section */
        .toolbar-left { display: flex; align-items: center; gap: 2px; }
        .toolbar-right { display: flex; align-items: center; gap: 6px; }

        /* Image attachment type tag */
        .attachment-type-tag { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); font-size: 9px; padding: 0 4px; border-radius: 3px; line-height: 1.4; white-space: nowrap; pointer-events: none; }
        .attachment-type-tag.image { background: rgba(79,110,247,0.85); color: #fff; }
        .attachment-type-tag.file { background: rgba(34,197,94,0.85); color: #fff; }

        /* Scrollbar */
        .messages-wrap::-webkit-scrollbar, .sidebar-list::-webkit-scrollbar, .thinking-block-body::-webkit-scrollbar { width: 5px; }
        .messages-wrap::-webkit-scrollbar-thumb, .sidebar-list::-webkit-scrollbar-thumb, .thinking-block-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        .messages-wrap::-webkit-scrollbar-track, .sidebar-list::-webkit-scrollbar-track, .thinking-block-body::-webkit-scrollbar-track { background: transparent; }

        /* Voice Input */
        .voice-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .voice-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .voice-btn svg { width: 20px; height: 20px; fill: #fff; }
        .voice-btn.recording { background: #ef4444; color: #fff; animation: voice-pulse 1.2s ease-in-out infinite; }
        .voice-btn.recording:hover { background: #dc2626; color: #fff; }
        .voice-btn.hidden { display: none; }
        @keyframes voice-pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

        /* Command Completion */
        .cmd-complete { position: absolute; bottom: 100%; left: 0; right: 0; margin-bottom: 4px; background: var(--bg-input-box); border: 1px solid var(--border-color); border-radius: 10px; box-shadow: var(--shadow-lg); max-height: 240px; overflow-y: auto; display: none; z-index: 100; animation: drop-up 0.15s ease-out; }
        .cmd-complete.show { display: block; }
        .cmd-complete-item { padding: 10px 14px; cursor: pointer; font-size: 13px; transition: background 0.15s; display: flex; align-items: flex-start; gap: 10px; }
        .cmd-complete-item:hover, .cmd-complete-item.active { background: var(--bg-hover); }
        .cmd-complete-item .cmd-name { font-weight: 600; color: var(--accent); white-space: nowrap; font-family: var(--font-mono); font-size: 13px; }
        .cmd-complete-item .cmd-name.subagent { color: #8b5cf6; }
        .cmd-complete-item .cmd-desc { color: var(--text-secondary); font-size: 12px; line-height: 1.4; }
        .cmd-complete-item .cmd-args { color: var(--text-secondary); font-size: 11px; font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
        .cmd-complete::-webkit-scrollbar { width: 4px; }
        .cmd-complete::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>

    fetch('/chat/meta').then(function (r) { return r.json(); }).then(function (res) {
        var meta = (res && res.data) ? res.data : res;
        if (!meta) return;
        if (meta.workname || meta.workspace) {
            document.title = (meta.workname || '') + ' - ' + (meta.workspace || '');
        }
        var verEl = document.getElementById('appVersionLabel');
        if (verEl && meta.appVersion) verEl.textContent = meta.appVersion;
        var titleEl = document.getElementById('welcomeTitle');
        if (titleEl && meta.appTitle) titleEl.textContent = '你好，我是 ' + meta.appTitle + ' Web ！';
    }).catch(function () { /* ignore */ });
</script>

<script>
    /* ===== DOM ===== */
    var welcomeView = document.getElementById('welcomeView');
    var chatView = document.getElementById('chatView');
    var messagesWrap = document.getElementById('messagesWrap');
    var welcomeInput = document.getElementById('welcomeInput');
    var welcomeSendBtn = document.getElementById('welcomeSendBtn');
    var chatInput = document.getElementById('chatInput');
    var chatSendBtn = document.getElementById('chatSendBtn');
    var themeBtn = document.getElementById('themeBtn');
    var themeIcon = document.getElementById('themeIcon');
    var newChatBtn = document.getElementById('newChatBtn');
    var historyList = document.getElementById('historyList');

    /* ===== Constants ===== */
    var DOTS_HTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';

    /* ===== Per-Session State ===== */
    function SessionState(sessionId) {
        this.sessionId = sessionId;
        this.container = document.createElement('div');
        this.container.className = 'messages-inner';
        this.container.style.display = 'none';
        messagesWrap.appendChild(this.container);
        this.eventSource = null;
        this.isStreaming = false;
        this.currentBubbleEl = null;
        this.reasonBuffer = '';
        this.thinkingBlockEl = null;
        this.thinkingBodyMdEl = null;
        this.thinkingBodyWrapEl = null;
        this.thinkingBuffer = '';
        this.pendingToolCard = null;
        this.thinkingEl = null;
        this.inlineThinkingEl = null;
        this.silenceTimer = null;
        this.contentRafId = null;
        this.reasonRafId = null;
        this.thinkingTimerId = null;
        this.thinkingStartTime = null;
        this.inlineThinkingTimerId = null;
        this.inlineThinkingStartTime = null;
        this.thinkingBlockTimerId = null;
        this.thinkingBlockStartTime = null;
    }

    var sessionMap = {};
    var activeSessionId = null;

    /* ===== Global State ===== */
    var SESSION_ID = 'web-' + Date.now().toString(36);
    setActiveSession(SESSION_ID);
    var isStreaming = false;
    var inChatMode = false;
    var chatHistory = [];
    var currentChatIndex = -1;
    var pendingFiles = []; // [{ type: 'image'|'file', name, size, file, dataUrl?, attachmentsType: 'image'|'file' }, ...]
    var MAX_ATTACHMENTS = 10;
    var userScrolledUp = false;

    /* ===== Session Helpers ===== */
    function getOrCreateSession(sessionId) {
        if (!sessionMap[sessionId]) {
            sessionMap[sessionId] = new SessionState(sessionId);
        }
        return sessionMap[sessionId];
    }

    function setActiveSession(sessionId) {
        if (activeSessionId && sessionMap[activeSessionId]) {
            sessionMap[activeSessionId].container.style.display = 'none';
        }
        var sess = getOrCreateSession(sessionId);
        sess.container.style.display = '';
        activeSessionId = sessionId;
        SESSION_ID = sessionId;
        isStreaming = sess.isStreaming;
        userScrolledUp = false;
        if (isStreaming) setBtnStopMode();
        else setBtnSendMode();
        // Refresh model selector for this session
        if (modelsLoaded) refreshSessionModel(sessionId);
    }

    function deactivateSession() {
        if (activeSessionId && sessionMap[activeSessionId]) {
            sessionMap[activeSessionId].container.style.display = 'none';
        }
        activeSessionId = null;
        isStreaming = false;
        setBtnSendMode();
    }

    /* ===== Attachment Helpers ===== */
    var welcomeAttachmentsWrap = document.getElementById('welcomeAttachmentsWrap');
    var chatAttachmentsWrap = document.getElementById('chatAttachmentsWrap');

    function handlePasteImage(e) {
        var items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                e.preventDefault();
                var file = items[i].getAsFile();
                processSelectedFile(file, 'image');
                return;
            }
        }
    }

    function getAttachmentsWrap() {
        return inChatMode ? chatAttachmentsWrap : welcomeAttachmentsWrap;
    }

    function renderAttachments() {
        // Render both wraps to keep them in sync when switching views
        renderAttachmentsWrap(welcomeAttachmentsWrap);
        renderAttachmentsWrap(chatAttachmentsWrap);
    }

    function renderAttachmentsWrap(wrap) {
        wrap.innerHTML = '';
        if (pendingFiles.length === 0) {
            wrap.classList.remove('has-items');
            return;
        }
        wrap.classList.add('has-items');
        for (var i = 0; i < pendingFiles.length; i++) {
            var item = pendingFiles[i];
            var el = document.createElement('div');
            el.className = 'attachment-item';
            var typeTag = '<span class="attachment-type-tag ' + (item.attachmentsType || 'file') + '">' + (item.attachmentsType === 'image' ? '多模态' : '文件') + '</span>';
            if (item.type === 'image') {
                el.innerHTML = '<img src="' + item.dataUrl + '"/>'
                    + typeTag
                    + '<button class="attachment-item-remove" data-idx="' + i + '">&times;</button>';
            } else {
                el.innerHTML = '<div class="attachment-item-file">'
                    + '<span class="file-icon">📎</span>'
                    + '<span class="file-name">' + escapeHtml(item.name) + '</span>'
                    + '</div>'
                    + typeTag
                    + '<button class="attachment-item-remove" data-idx="' + i + '">&times;</button>';
            }
            wrap.appendChild(el);
        }
    }

    function clearAttachmentPreview() {
        pendingFiles = [];
        renderAttachments();
    }

    function removeAttachment(idx) {
        pendingFiles.splice(idx, 1);
        renderAttachments();
    }



    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function processSelectedFile(file, attachmentsType) {
        if (!file) return;
        if (pendingFiles.length >= MAX_ATTACHMENTS) return;

        if (attachmentsType === 'image') {
            // Image attachment: always treated as multimodal image
            var reader = new FileReader();
            reader.onload = function(evt) {
                pendingFiles.push({ type: 'image', name: file.name, size: file.size, file: file, dataUrl: evt.target.result, attachmentsType: 'image' });
                renderAttachments();
            };
            reader.readAsDataURL(file);
        } else if (file.type.indexOf('image') !== -1) {
            // File attachment + image file: show preview but mark as file type
            var reader = new FileReader();
            reader.onload = function(evt) {
                pendingFiles.push({ type: 'image', name: file.name, size: file.size, file: file, dataUrl: evt.target.result, attachmentsType: 'file' });
                renderAttachments();
            };
            reader.readAsDataURL(file);
        } else {
            pendingFiles.push({ type: 'file', name: file.name, size: file.size, file: file, attachmentsType: 'file' });
            renderAttachments();
        }
    }

    function processSelectedFiles(fileList, attachmentsType) {

    function deleteSession(idx) {
        var entry = chatHistory[idx];
        if (!entry) return;

        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/chat/sessions/delete?sessionId=' + encodeURIComponent(entry.sessionId), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                /* Clean up session state after server confirms */
                var sess = sessionMap[entry.sessionId];
                if (sess) {
                    if (sess.eventSource) sess.eventSource.close();
                    if (sess.silenceTimer) clearTimeout(sess.silenceTimer);
                    if (sess.contentRafId) cancelAnimationFrame(sess.contentRafId);
                    if (sess.reasonRafId) cancelAnimationFrame(sess.reasonRafId);
                    if (sess.container.parentNode) sess.container.parentNode.removeChild(sess.container);
                    delete sessionMap[entry.sessionId];
                }

                chatHistory.splice(idx, 1);

                if (idx === currentChatIndex) {
                    currentChatIndex = -1;
                    switchToWelcomeMode();
                } else if (idx < currentChatIndex) {
                    currentChatIndex--;
                }

                updateHistoryUI();
            }
        };
        xhr.send();

        setActiveSession(entry.sessionId);
        updateHistoryUI();

        var sess = sessionMap[entry.sessionId];
        /* Only load from server if not streaming and container has no content */
        if (!sess.isStreaming && sess.container.children.length === 0) {

    function loadMessages(sess) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/chat/messages?sessionId=' + encodeURIComponent(sess.sessionId), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var msgs = JSON.parse(xhr.responseText).data;
                    sess.container.innerHTML = '';
                    resetStreamState(sess);
                    for (var i = 0; i < msgs.length; i++) {
                        var m = msgs[i];
                        if (m.role === 'USER') {
                            resetStreamState(sess);
                            appendUserMessage(sess, m.content);
                        } else if (m.role === 'ASSISTANT') {
                            var isConsecutive = (i > 0 && msgs[i - 1].role === 'ASSISTANT');
                            if (!isConsecutive) resetStreamState(sess);
                            var el = ensureAssistantBubble(sess);
                            sess.reasonBuffer = isConsecutive ? sess.reasonBuffer + '\n\n' + m.content : m.content;
                            el.innerHTML = renderMd(sess.reasonBuffer);
                        }
                    }
                    resetStreamState(sess);
                    if (sess.sessionId === activeSessionId) scrollToBottom(true);
                } catch (e) {}
            }
        };
        xhr.send();
    }

    /* ===== Voice Input (Web Speech API) - 按住说话（类似微信） ===== */
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var recognition = null;
    var voiceRecording = false;
    var voiceTargetInput = null; // 当前语音目标 textarea
    var voiceBaseText = '';      // 开始录音时 textarea 已有文本
    var voiceFinalTranscript = ''; // 累计的最终识别文本

    var welcomeVoiceBtn = document.getElementById('welcomeVoiceBtn');
    var chatVoiceBtn = document.getElementById('chatVoiceBtn');

    var voiceRafPending = false; // 限制 DOM 更新频率

    function initVoice() {
        if (!SpeechRecognition) return; // 浏览器不支持
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = true; // 按住期间持续识别
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onresult = function(event) {
            var interimTranscript = '';
            var finalTranscript = '';
            for (var i = event.resultIndex; i < event.results.length; i++) {
                var transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interimTranscript += transcript;
                }
            }
            // 累积最终结果
            if (finalTranscript) {
                voiceFinalTranscript += finalTranscript;
            }
            // 用 RAF 节流 DOM 更新，避免频繁重绘拖慢感知
            if (!voiceRafPending && voiceTargetInput) {
                voiceRafPending = true;
                requestAnimationFrame(function() {
                    voiceRafPending = false;
                    if (voiceTargetInput) {
                        voiceTargetInput.value = voiceBaseText + voiceFinalTranscript + interimTranscript;
                        autoResize(voiceTargetInput);
                    }
                });
            }
        };

        recognition.onerror = function(event) {
            console.warn('Speech recognition error:', event.error);
            stopVoiceRecording();
        };

        recognition.onend = function() {
            // 如果还在按住状态（voiceRecording），自动重启继续识别
            if (voiceRecording) {
                try { recognition.start(); } catch(e) {}
            } else {
                stopVoiceRecording();
            }
        };

        // 显示语音按钮
        welcomeVoiceBtn.classList.remove('hidden');
        chatVoiceBtn.classList.remove('hidden');
    }

    function startVoiceRecording(inputEl) {
        if (!recognition) return;
        if (voiceRecording) return;

        voiceTargetInput = inputEl;
        voiceBaseText = inputEl.value;
        voiceFinalTranscript = '';
        voiceRecording = true;

        try { recognition.start(); } catch(e) {}

        // 更新按钮状态
        var btn = (inputEl === welcomeInput) ? welcomeVoiceBtn : chatVoiceBtn;
        btn.classList.add('recording');
        btn.title = '松开结束';
    }

    function stopVoiceRecording() {
        if (!voiceRecording && !recognition) return;
        voiceRecording = false;
        try { if (recognition) recognition.stop(); } catch(e) {}

        // 更新按钮状态
        welcomeVoiceBtn.classList.remove('recording');
        chatVoiceBtn.classList.remove('recording');
        welcomeVoiceBtn.title = '按住说话';
        chatVoiceBtn.title = '按住说话';

        // 保留识别到的文本，重置基线以便下次追加
        if (voiceTargetInput) {
            voiceBaseText = voiceTargetInput.value;
        }
        voiceFinalTranscript = '';
        voiceTargetInput = null;
    }

    // --- 按住说话：按下开始录音，松开结束（类似微信） ---
    function bindVoiceHold(btn, inputEl) {
        // 鼠标：按下开始，松开结束
        btn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startVoiceRecording(inputEl);
        });
        btn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            stopVoiceRecording();
        });
        btn.addEventListener('mouseleave', function() {
            if (voiceRecording) stopVoiceRecording();
        });

        // 触摸：按下开始，松开结束
        btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            startVoiceRecording(inputEl);
        });
        btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            stopVoiceRecording();
        });
        btn.addEventListener('touchcancel', function() {
            if (voiceRecording) stopVoiceRecording();
        });
    }

    initVoice();

    /* ===== Command System ===== */
    var commandList = []; // [{name, description, type}, ...]
    var commandsLoaded = false;
    var cmdTrigger = null; // '/' for commands, '@' for subagents

    function loadCommands() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/chat/commands', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var resp = JSON.parse(xhr.responseText);
                    commandList = resp.data || [];
                    commandsLoaded = true;
                } catch (e) {}
            }
        };
        xhr.send();
    }

    loadCommands();

    var welcomeCmdComplete = document.getElementById('welcomeCmdComplete');
    var chatCmdComplete = document.getElementById('chatCmdComplete');
    var cmdActiveIndex = -1;
    var cmdVisibleItems = [];

    function getActiveCmdComplete() {
        return inChatMode ? chatCmdComplete : welcomeCmdComplete;
    }

    function showCmdComplete(inputEl, completeEl, prefix) {
        if (!commandsLoaded || commandList.length === 0) return;

        var trigger = prefix.charAt(0);
        var query = prefix.substring(1).toLowerCase();
        var filterType = (trigger === '@') ? 'subagent' : 'command';
        cmdVisibleItems = [];
        var html = '';

        for (var i = 0; i < commandList.length; i++) {
            var cmd = commandList[i];
            // Filter by type based on trigger
            if (cmd.type !== filterType) continue;
            if (cmd.name.toLowerCase().indexOf(query) === 0 || query.length === 0) {
                cmdVisibleItems.push(cmd);
                var nameClass = (trigger === '@') ? 'cmd-name subagent' : 'cmd-name';
                html += '<div class="cmd-complete-item" data-index="' + (cmdVisibleItems.length - 1) + '">'
                    + '<span class="' + nameClass + '">' + escapeHtml(trigger + cmd.name) + '</span>'
                    + '<span class="cmd-desc">' + escapeHtml(cmd.description || '') + '</span>'
                    + '</div>';
            }
        }

        if (cmdVisibleItems.length === 0) {
            hideCmdComplete();
            return;
        }

        cmdTrigger = trigger;
        cmdActiveIndex = -1;
        completeEl.innerHTML = html;
        completeEl.classList.add('show');
    }

    function hideCmdComplete() {
        welcomeCmdComplete.classList.remove('show');
        chatCmdComplete.classList.remove('show');
        cmdActiveIndex = -1;
        cmdVisibleItems = [];
        cmdTrigger = null;
    }

    function applyCmdSelection(inputEl, completeEl) {
        if (cmdActiveIndex >= 0 && cmdActiveIndex < cmdVisibleItems.length) {
            var cmd = cmdVisibleItems[cmdActiveIndex];
            var trigger = cmdTrigger || '/';
            var parts = inputEl.value.trim().split(/\s+/);
            // Keep existing args after command name
            var argsStr = parts.length > 1 ? parts.slice(1).join(' ') : '';
            inputEl.value = trigger + cmd.name + (argsStr ? ' ' + argsStr : ' ');
            autoResize(inputEl);
        }
        hideCmdComplete();
    }

    function navigateCmdComplete(e, inputEl, completeEl) {
        if (!completeEl.classList.contains('show')) return false;
        // 输入法组合中，不处理命令补全的回车
        if (e.isComposing) return false;

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            var items = completeEl.querySelectorAll('.cmd-complete-item');
            if (items.length === 0) return true;

            // Remove old active
            if (cmdActiveIndex >= 0 && items[cmdActiveIndex]) {
                items[cmdActiveIndex].classList.remove('active');
            }

            if (e.key === 'ArrowDown') {
                cmdActiveIndex = (cmdActiveIndex + 1) % items.length;
            } else {
                cmdActiveIndex = cmdActiveIndex <= 0 ? items.length - 1 : cmdActiveIndex - 1;
            }

            items[cmdActiveIndex].classList.add('active');
            items[cmdActiveIndex].scrollIntoView({ block: 'nearest' });
            return true;
        }

        if (e.key === 'Tab' || (e.key === 'Enter' && cmdActiveIndex >= 0)) {
            e.preventDefault();
            applyCmdSelection(inputEl, completeEl);
            return true;
        }

        if (e.key === 'Escape') {
            hideCmdComplete();
            return true;
        }

        return false;
    }

    function handleInputForCommands(e) {
        var inputEl = e.target;
        var completeEl = (inputEl === welcomeInput) ? welcomeCmdComplete : chatCmdComplete;
        var val = inputEl.value;

        if (val.indexOf('/') === 0 || val.indexOf('@') === 0) {
            // Only show completion when cursor is at the command/agent name part (no spaces yet)
            var cursorPos = inputEl.selectionStart;
            var textBeforeCursor = val.substring(0, cursorPos);
            var spaceIndex = textBeforeCursor.indexOf(' ');
            if (spaceIndex === -1) {
                showCmdComplete(inputEl, completeEl, textBeforeCursor);
            } else {
                hideCmdComplete();
            }
        } else {
            hideCmdComplete();
        }
    }

    welcomeInput.addEventListener('input', handleInputForCommands);
    chatInput.addEventListener('input', handleInputForCommands);

    // Keyboard navigation for command completion
    welcomeInput.addEventListener('keydown', function(e) {
        // 输入法正在组合中（如拼音选词），不触发发送
        if (e.isComposing) return;
        var handled = navigateCmdComplete(e, welcomeInput, welcomeCmdComplete);
        if (handled) return;
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    chatInput.addEventListener('keydown', function(e) {
        // 输入法正在组合中（如拼音选词），不触发发送
        if (e.isComposing) return;
        var handled = navigateCmdComplete(e, chatInput, chatCmdComplete);
        if (handled) return;
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }

    /* ===== Model Selector ===== */
    var modelList = [];        // [{name, desc}, ...] (shared, only loaded once)
    var modelsLoaded = false;  // whether model list has been fetched
    var sessionModelMap = {};  // { sessionId: selectedModelName }

    // Get the effective selected model for current context
    function getSelectedModel() {
        if (activeSessionId && sessionModelMap[activeSessionId]) {
            return sessionModelMap[activeSessionId];
        }
        return sessionModelMap['_default'] || '';
    }

    // Load model list (once) + selected model for given session
    function loadModels(sessionId, callback) {
        var url = '/chat/models';
        if (sessionId) url += '?sessionId=' + encodeURIComponent(sessionId);

        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var resp = JSON.parse(xhr.responseText).data;
                    var selected = resp.selected || '';

                    // Store selected model per session
                    if (sessionId) {
                        sessionModelMap[sessionId] = selected;
                    } else {
                        sessionModelMap['_default'] = selected;
                    }

                    // Only parse list once (it's the same for all sessions)
                    if (!modelsLoaded) {
                        modelList = [];
                        var list = resp.list || [];
                        for (var i = 0; i < list.length; i++) {
                            modelList.push({ name: list[i].model, desc: list[i].description });
                        }
                        modelsLoaded = true;
                    }

                    renderModelUI();
                    if (callback) callback();
                } catch (e) {
                    console.error('Failed to parse models:', e);
                }
            }
        };
        xhr.send();
    }

    // Refresh model UI for a specific session using local cache (no network request)
    function refreshSessionModel(sessionId) {
        if (!sessionId) return;
        // If we haven't seen this session's model yet, fetch it from backend
        if (!sessionModelMap[sessionId]) {
            var url = '/chat/models?sessionId=' + encodeURIComponent(sessionId);
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var resp = JSON.parse(xhr.responseText).data;
                        sessionModelMap[sessionId] = resp.selected || '';
                        renderModelUI();
                    } catch (e) {}
                }
            };
            xhr.send();
        } else {
            // Already cached — just re-render UI
            renderModelUI();
        }
    }

    function renderModelUI() {
        var chatName = document.getElementById('chatModelName');
        var welcomeName = document.getElementById('welcomeModelName');
        var chatDropdown = document.getElementById('chatModelDropdown');
        var welcomeDropdown = document.getElementById('welcomeModelDropdown');

        var currentModel = getSelectedModel();
        var displayName = currentModel.length > 24 ? currentModel.substring(0, 24) + '...' : currentModel;
        if (chatName) chatName.textContent = displayName || '默认模型';
        if (welcomeName) welcomeName.textContent = displayName || '默认模型';

        var html = '';
        for (var i = 0; i < modelList.length; i++) {
            var m = modelList[i];
            var cls = m.name === currentModel ? ' active' : '';
            html += '<div class="model-dropdown-item' + cls + '" data-model="' + escapeHtml(m.name) + '">'
                + '<span class="model-item-name">' + escapeHtml(m.name) + '</span>'
                + (m.desc ? '<span class="model-item-desc">' + escapeHtml(m.desc) + '</span>' : '')
                + '</div>';
        }
        if (chatDropdown) chatDropdown.innerHTML = html;
        if (welcomeDropdown) welcomeDropdown.innerHTML = html;
    }

    function selectModel(modelName) {
        var sid = activeSessionId || SESSION_ID;
        sessionModelMap[sid] = modelName;
        renderModelUI();
    }

    // Toggle dropdown open/close
    function initModelSelector(selectorId, currentId, dropdownId) {
        var selector = document.getElementById(selectorId);
        var current = document.getElementById(currentId);
        var dropdown = document.getElementById(dropdownId);
        if (!selector || !current || !dropdown) return;

        current.addEventListener('click', function(e) {
            e.stopPropagation();
            // Close all other selectors
            document.querySelectorAll('.model-selector.open').forEach(function(el) {
                if (el.id !== selectorId) el.classList.remove('open');
            });
            selector.classList.toggle('open');
        });

        dropdown.addEventListener('click', function(e) {
            var item = e.target.closest('.model-dropdown-item');
            if (!item) return;
            e.stopPropagation();
            var modelName = item.getAttribute('data-model');
            if (modelName && modelName !== getSelectedModel()) {
                selectModel(modelName);
            }
            selector.classList.remove('open');
        });
    }

    // Close all dropdowns on outside click
    document.addEventListener('click', function() {
        document.querySelectorAll('.model-selector.open').forEach(function(el) {

    initModelSelector('chatModelSelector', 'chatModelCurrent', 'chatModelDropdown');
    initModelSelector('welcomeModelSelector', 'welcomeModelCurrent', 'welcomeModelDropdown');

    function ensureAssistantBubble(sess) {
        if (!sess.currentBubbleEl) {
            removeThinking(sess);
            var row = document.createElement('div');
            row.className = 'msg-row assistant';
            row.innerHTML = '<div class="msg-avatar"><i class="layui-icon layui-icon-bot" style="font-size:18px"></i></div>'

                + '</div></div>';
            sess.container.appendChild(row);
            sess.currentBubbleEl = row.querySelector('.md-content');
            var copyBtn = row.querySelector('.copy-btn');
            var mdRef = sess.currentBubbleEl;
            copyBtn.addEventListener('click', function() {
                var txt = mdRef.innerText || '';
                if (navigator.clipboard) { navigator.clipboard.writeText(txt); }
            });

    function ensureThinkingBlock(sess) {
        if (!sess.thinkingBlockEl) {
            ensureAssistantBubble(sess);
            var parent = sess.currentBubbleEl.parentNode;
            var block = document.createElement('div');
            block.className = 'thinking-block streaming expanded';
            block.innerHTML = '<div class="thinking-block-header">'
                + '<span class="thinking-block-label">思考中...</span>'
                + '<span class="thinking-timer" style="margin-left:4px">0s</span>'
                + '<span class="thinking-block-dots"><span></span><span></span><span></span></span>'
                + '<i class="layui-icon layui-icon-right thinking-block-toggle"></i>'
                + '</div>'
                + '<div class="thinking-block-body"><div class="md-content"></div></div>';
            parent.insertBefore(block, sess.currentBubbleEl);
            block.querySelector('.thinking-block-header').addEventListener('click', function() {
                block.classList.toggle('expanded');
            });
            sess.thinkingBlockEl = block;
            sess.thinkingBodyMdEl = block.querySelector('.thinking-block-body .md-content');
            sess.thinkingBodyWrapEl = block.querySelector('.thinking-block-body');
            sess.thinkingBuffer = '';
            var timerSpan = block.querySelector('.thinking-timer');
            startThinkingTimer(sess, 'thinkingBlockTimerId', 'thinkingBlockStartTime', timerSpan);

    function insertBeforeActions(sess, el) {
        var parent = sess.currentBubbleEl.parentNode;
        parent.insertBefore(el, parent.querySelector('.msg-actions'));
    }

    function finishThinkingBlock(sess) {
        if (sess.thinkingBlockEl) {
            stopThinkingTimer(sess, 'thinkingBlockTimerId', 'thinkingBlockStartTime');
            if (sess.reasonRafId) {
                cancelAnimationFrame(sess.reasonRafId);
                sess.reasonRafId = null;
                if (sess.thinkingBodyMdEl) {
                    sess.thinkingBodyMdEl.innerHTML = renderMd(sess.thinkingBuffer);
                }
            }
            sess.thinkingBlockEl.classList.remove('streaming', 'expanded');
            var elapsed = '';
            if (sess.thinkingBlockStartTime) {
                elapsed = ' (' + Math.floor((Date.now() - sess.thinkingBlockStartTime) / 1000) + 's)';
            }
            var label = sess.thinkingBlockEl.querySelector('.thinking-block-label');
            if (label) label.textContent = '思考结束' + elapsed;
            var dots = sess.thinkingBlockEl.querySelector('.thinking-block-dots');
            if (dots) dots.remove();
            var timerSpan = sess.thinkingBlockEl.querySelector('.thinking-timer');
            if (timerSpan) timerSpan.remove();
            sess.thinkingBlockEl = null;
            sess.thinkingBodyMdEl = null;
            sess.thinkingBodyWrapEl = null;
            sess.thinkingBuffer = '';
        }

    function clearThinkTags(text) {
        return text.replace(/<\s*\/?think\s*>/gi, '');
    }

    function appendReasonChunk(sess, text) {
        removeThinking(sess);
        ensureThinkingBlock(sess);
        sess.thinkingBuffer += clearThinkTags(text);
        if (!sess.reasonRafId) {
            sess.reasonRafId = requestAnimationFrame(function() {
                sess.reasonRafId = null;
                if (!sess.thinkingBlockEl) return;
                if (sess.thinkingBodyMdEl) {
                    sess.thinkingBodyMdEl.innerHTML = renderMd(sess.thinkingBuffer);
                }
                if (sess.thinkingBodyWrapEl) {
                    sess.thinkingBodyWrapEl.scrollTop = sess.thinkingBodyWrapEl.scrollHeight;
                }
                if (sess.sessionId === activeSessionId) scrollToBottom();
            });
        }
    }

    function finishPendingTool(sess) {

            if (icon) { icon.className = 'tool-status-icon done'; icon.innerHTML = '<i class="layui-icon layui-icon-ok" style="font-size:12px"></i>'; }

            sess.pendingToolCard = null;
        }
    }

    function appendActionEndChunk(sess, toolName, text, args) {
        finishPendingTool(sess);
        ensureAssistantBubble(sess);

        // 参考 CliShell 简化打印方式，将 args 拼接为短字符串
        function formatArgValue(v) {
            if (v === null) return 'null';
            if (v === undefined) return 'undefined';
            if (typeof v === 'string') return v.replace(/\n/g, ' ');
            if (typeof v === 'number' || typeof v === 'boolean') return String(v);
            if (Array.isArray(v)) return '[' + v.length + '项]';
            if (typeof v === 'object') {
                var keys = Object.keys(v);
                if (keys.length === 0) return '{}';
                if (keys.length > 3) return '{' + keys.slice(0, 2).join(',') + ',...}';
                var inner = [];
                keys.forEach(function(k) { inner.push(k + ':' + formatArgValue(v[k])); });
                var s = '{' + inner.join(',') + '}';
                return s.length > 30 ? '{' + keys.join(',') + '}' : s;
            }
            return String(v);
        }
        var argsHtml = '';
        if (args && typeof args === 'object') {
            var parts = [];
            Object.keys(args).forEach(function(k) {
                parts.push(k + '=' + formatArgValue(args[k]));
            });
            var argsStr = parts.join(' ');
            if (argsStr.length > 80) argsStr = argsStr.substring(0, 77) + '...';
            if (argsStr) argsHtml = '<span class="tool-args">' + escapeHtml(argsStr) + '</span>';
        }

        var card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML = '<div class="tool-card-header">'
            + '<span class="tool-status-icon loading"></span>'
            + '<span class="tool-name">' + escapeHtml(toolName || 'tool') + '</span>'
            + argsHtml
            + '<i class="layui-icon layui-icon-right tool-toggle"></i>'
            + '</div>'
            + '<div class="tool-card-body"></div>';

        card.querySelector('.tool-card-body').textContent = text || '';
        card.querySelector('.tool-card-header').addEventListener('click', function() {
            card.classList.toggle('expanded');
        });

        insertBeforeActions(sess, card);
        sess.pendingToolCard = card;

        sess.reasonBuffer = '';
        var newMd = document.createElement('div');
        newMd.className = 'md-content';
        insertBeforeActions(sess, newMd);
        sess.currentBubbleEl = newMd;
        if (sess.sessionId === activeSessionId) scrollToBottom();
    }

    function appendContentChunk(sess, text, append) {

        sess.reasonBuffer = append ? sess.reasonBuffer + clean : clean;
        if (!sess.contentRafId) {

    /* ===== Thinking Indicators ===== */
    function startThinkingTimer(sess, timerKey, startTimeKey, labelEl) {
        sess[startTimeKey] = Date.now();
        if (sess[timerKey]) clearInterval(sess[timerKey]);
        sess[timerKey] = setInterval(function() {
            if (!labelEl || !labelEl.parentNode) { clearInterval(sess[timerKey]); sess[timerKey] = null; return; }
            var elapsed = Math.floor((Date.now() - sess[startTimeKey]) / 1000);
            labelEl.textContent = elapsed + 's';
        }, 1000);
    }

    function stopThinkingTimer(sess, timerKey, startTimeKey) {
        if (sess[timerKey]) { clearInterval(sess[timerKey]); sess[timerKey] = null; }
        sess[startTimeKey] = null;
    }

    function showThinking(sess) {
        removeThinking(sess);
        sess.thinkingEl = document.createElement('div');
        sess.thinkingEl.className = 'thinking-row';
        sess.thinkingEl.innerHTML = '<div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff">'
            + '<i class="layui-icon layui-icon-bot" style="font-size:18px"></i></div>'
            + '<div class="thinking-bubble">思考中' + DOTS_HTML + '<span class="thinking-timer">0s</span></div>';
        sess.container.appendChild(sess.thinkingEl);

    function removeThinking(sess) {

    }

    /* ===== HITL ===== */
    function appendHitlCard(sess, toolName, command) {
        ensureAssistantBubble(sess);

        var card = document.createElement('div');
        card.className = 'hitl-card';
        card.innerHTML = '<div class="hitl-card-header">'
            + '<i class="layui-icon layui-icon-tips"></i> \u9700\u8981\u6388\u6743'
            + '</div>'
            + '<div class="hitl-card-body">'
            + '<div class="hitl-tool">\u5de5\u5177: <strong>' + escapeHtml(toolName || 'unknown') + '</strong></div>'
            + (command ? '<div class="hitl-command">' + escapeHtml(command) + '</div>' : '')
            + '</div>'
            + '<div class="hitl-card-actions">'
            + '<button class="hitl-btn hitl-btn-approve">\u6279\u51c6</button>'
            + '<button class="hitl-btn hitl-btn-reject">\u62d2\u7edd</button>'
            + '</div>';

        insertBeforeActions(sess, card);

        var approveBtn = card.querySelector('.hitl-btn-approve');
        var rejectBtn = card.querySelector('.hitl-btn-reject');

        approveBtn.addEventListener('click', function() {
            approveBtn.disabled = true;
            rejectBtn.disabled = true;
            approveBtn.textContent = '\u5df2\u6279\u51c6';
            rejectBtn.style.display = 'none';
            card.style.borderColor = '#22c55e';
            handleHitlResponse(sess, 'approve');
        });

        rejectBtn.addEventListener('click', function() {
            approveBtn.disabled = true;
            rejectBtn.disabled = true;
            rejectBtn.textContent = '\u5df2\u62d2\u7edd';

            card.style.borderColor = '#ef4444';
