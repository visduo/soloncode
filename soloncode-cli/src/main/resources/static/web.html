<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Solon Code Web</title>
    <link rel="stylesheet" href="/layui/css/layui.css"/>
    <link rel="stylesheet" href="/css/theme.css"/>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body data-theme="light">

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
            <i class="layui-icon layui-icon-addition"></i> 新对话
        </button>
    </div>
    <div class="sidebar-title">最近对话</div>
    <div class="sidebar-list" id="historyList"></div>
    <div class="sidebar-footer">
        <i class="layui-icon layui-icon-about" style="font-size:15px;color:var(--text-secondary)"></i>
        <span id="appVersionLabel" style="font-size:12px;color:var(--text-secondary)">AI</span>
    </div>
</div>
<button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="收起侧边栏">‹</button>

<!-- Main -->
<div class="main-area">
    <div class="main-header">
        <button class="wechat-btn-header" id="wechatHeaderBtn" title="微信接管">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zM14.033 13.3c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/></svg>
            <span class="wechat-label" id="wechatHeaderLabel"></span>
        </button>
        <button class="theme-toggle" id="themeBtn" title="切换主题">
            <i class="layui-icon" id="themeIcon">&#xe748;</i>
        </button>
    </div>

    <!-- Welcome View -->
    <div class="welcome-view" id="welcomeView">
        <div class="welcome-avatar">
            <div class="blob blob-outer"></div>
            <div class="blob-core"></div>
        </div>
        <div class="welcome-title" id="welcomeTitle">你好，我是 SolonCode Web ！</div>
        <div class="welcome-sub">有什么我可以帮你的吗?</div>
        <div class="welcome-input-box">
            <div class="attachments-wrap" id="welcomeAttachmentsWrap"></div>
            <div style="position:relative">
                <div class="cmd-complete" id="welcomeCmdComplete"></div>
                <textarea id="welcomeInput" placeholder="随便问..." rows="1" autofocus style="width: 100%;"></textarea>
            </div>
            <div class="welcome-toolbar">
                <div class="toolbar-left">
                    <div class="model-selector" id="welcomeModelSelector">
                        <div class="model-selector-current" id="welcomeModelCurrent" title="切换模型">
                            <span class="model-name" id="welcomeModelName">加载中...</span>
                            <i class="layui-icon layui-icon-down model-arrow"></i>
                        </div>
                        <div class="model-dropdown" id="welcomeModelDropdown"></div>
                    </div>
                    <button class="attach-btn" id="welcomeAttachBtn" title="添加文件附件">
                        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <input type="file" class="attach-input" id="welcomeAttachInput" multiple accept="*/*"/>
                    <button class="attach-btn" id="welcomeImageBtn" title="添加图片附件（多模态）">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                    </button>
                    <input type="file" class="attach-input" id="welcomeImageInput" multiple accept="image/*"/>
                    <button class="attach-btn" id="welcomeCmdBtn" title="斜杠命令">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L16 4"/><circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/></svg>
                    </button>
                    <button class="attach-btn" id="welcomeAgentBtn" title="子代理">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="2" x2="19" y2="6"/><line x1="17" y1="4" x2="21" y2="4"/></svg>
                    </button>
                </div>
                <div class="toolbar-right">
                    <button class="voice-btn hidden" id="welcomeVoiceBtn" title="语音输入">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </button>
                    <button class="welcome-send-btn" id="welcomeSendBtn" title="发送">
                        <i class="layui-icon layui-icon-release"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat View -->
    <div class="chat-view" id="chatView">
        <div class="messages-wrap" id="messagesWrap">
            <!-- Per-session containers are added here dynamically -->
        </div>
        <div class="input-wrap">
            <div class="input-box">
                <div class="attachments-wrap" id="chatAttachmentsWrap"></div>
                <div style="position:relative;">
                    <div class="cmd-complete" id="chatCmdComplete"></div>
                    <textarea id="chatInput" placeholder="随便问..." rows="1" style="width:100%"></textarea>
                </div>
                <div class="input-toolbar">
                    <div class="toolbar-left">
                        <div class="model-selector" id="chatModelSelector">
                            <div class="model-selector-current" id="chatModelCurrent" title="切换模型">
                                <span class="model-name" id="chatModelName">加载中...</span>
                                <i class="layui-icon layui-icon-down model-arrow"></i>
                            </div>
                            <div class="model-dropdown" id="chatModelDropdown"></div>
                        </div>
                        <button class="attach-btn" id="chatAttachBtn" title="添加文件附件">
                            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <input type="file" class="attach-input" id="chatAttachInput" multiple accept="*/*"/>
                        <button class="attach-btn" id="chatImageBtn" title="添加图片附件（多模态）">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        </button>
                        <input type="file" class="attach-input" id="chatImageInput" multiple accept="image/*"/>
                        <button class="attach-btn" id="chatCmdBtn" title="斜杠命令">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L16 4"/><circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/></svg>
                        </button>
                        <button class="attach-btn" id="chatAgentBtn" title="子代理">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="2" x2="19" y2="6"/><line x1="17" y1="4" x2="21" y2="4"/></svg>
                        </button>
                    </div>
                    <div class="toolbar-right">
                        <button class="voice-btn hidden" id="chatVoiceBtn" title="语音输入">
                            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        </button>
                        <button class="send-btn" id="chatSendBtn" title="发送">
                            <i class="layui-icon layui-icon-release"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/layui/layui.js"></script>
<script src="/js/marked.min.js"></script>
<script src="/js/qrcode.min.js"></script>

<script>
    var SSE_ENDPOINT = "/chat/input";
    // 启动时拉取页面元信息（appTitle / appVersion / workspace / workname），回填标题/侧栏
    fetch('/chat/meta').then(function (r) { return r.json(); }).then(function (res) {
        var meta = (res && res.data) ? res.data : res;
        if (!meta) return;
        if (meta.workname || meta.workspace) {
            document.title = (meta.workname || '') + ' - ' + (meta.workspace || '');
        }
        var verEl = document.getElementById('appVersionLabel');
        if (verEl && meta.appVersion) verEl.textContent = meta.appVersion;
        var titleEl = document.getElementById('welcomeTitle');
        if (titleEl && meta.appTitle) titleEl.textContent = '你好，我是 ' + meta.appTitle + ' Web ！';
    }).catch(function () { /* ignore */ });
</script>

<script src="js/app.js"></script>
</body>
</html>
